mode: molecule

model:
  path: /path/to/mace.model
  device: cuda

thermo:
  temperature: 298.15
  pressure: 101325.0

plots:
  enabled: false

output:
  dir: molecule_results
  write_summary: true

molecule:
  geometry_file: molecule.xyz
  mol_geometry: nonlinear
  symmetry_number: 1
  spin: 0.0
  vacuum: 15.0

  relax:
    fmax: 0.01

  vibrations:
    clean: false
